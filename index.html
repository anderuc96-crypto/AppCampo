<!DOCTYPE html>
<html>
<head>
    <title>Visor GIS - Tracker y polígonos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; overflow: hidden; }

        body {
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 14px 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .header h1 { font-size: 1.2rem; font-weight: 600; }
        .header p  { font-size: 0.75rem; opacity: 0.85; margin-top: 4px; }

        .console {
            background: #ffffff;
            border-bottom: 2px solid #e0e0e0;
            padding: 14px 20px;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 0.9rem;
            color: #2c3e50;
            text-align: center;
            z-index: 10;
        }

        .console span { color: #27ae60; font-weight: 600; }
        .console .icon { font-size: 1.1rem; margin-right: 8px; }

        #map {
            flex: 1;
            width: 100%;
            background-color: #e8ecf1;
            position: relative;
        }

        .button-panel {
            background: #ffffff;
            padding: 16px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            z-index: 10;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-group + .btn-group { border-left: 1px solid #ddd; padding-left: 12px; }

        button {
            padding: 12px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #f0f2f5;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 95px;
            justify-content: center;
        }

        button:active      { transform: scale(0.96); }
        button.activo      { background: #27ae60; color: white; }
        button.activo-gps  { background: #2980b9; color: white; }
        button.activo-punto { background: #8e44ad; color: white; }

        button.track-activo {
            background: #e74c3c;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0    rgba(231,76,60,0.4); }
            70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0);   }
            100% { box-shadow: 0 0 0 0    rgba(231,76,60,0);   }
        }

        /* [v3] position:fixed para que no se desplace en móvil */
        .polygon-popup {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 14px 18px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.15);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.85rem;
            color: #2c3e50;
            pointer-events: none;
            z-index: 1000;
            max-width: 280px;
            border-left: 4px solid #27ae60;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0);   }
        }

        #compass {
            position: fixed;
            top: 80px; left: 15px;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            cursor: pointer;
            backdrop-filter: blur(4px);
            border: 1px solid #ddd;
            transition: all 0.2s ease;
        }

        #compass:hover  { transform: scale(1.05); background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.25); }
        #compass:active { transform: scale(0.95); }
        #compass svg    { width: 32px; height: 32px; transition: transform 0.3s ease; }

        /* [v3] Barra de escala con ancho dinámico */
        #scale-bar {
            position: fixed;
            bottom: 85px; left: 15px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            border-radius: 6px;
            padding: 6px 10px;
            backdrop-filter: blur(4px);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        #scale-ruler { display: flex; align-items: center; }

        .scale-tick {
            width: 2px; height: 8px;
            background: white;
            flex-shrink: 0;
        }

        #scale-body {
            height: 3px;
            background: white;
            min-width: 40px;
            transition: width 0.2s ease;
        }

        #scale-val {
            color: white;
            font-size: 0.65rem;
            font-family: 'SF Mono', monospace;
            margin-top: 3px;
            text-align: center;
            white-space: nowrap;
        }

        /* [v3] Panel de confirmación de borrado (móvil) */
        #confirm-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
        }

        #confirm-dialog {
            background: white;
            border-radius: 16px;
            padding: 24px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            max-width: 300px;
            width: 88%;
            text-align: center;
        }

        #confirm-dialog p {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .confirm-buttons { display: flex; gap: 12px; justify-content: center; }

        #confirm-dialog button {
            min-width: 110px;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            animation: none;
        }

        #confirm-dialog .btn-confirmar { background: #e74c3c; color: white; }
        #confirm-dialog .btn-cancelar  { background: #ecf0f1; color: #2c3e50; }

        /* [v4] Modal de observaciones para puntos de campo */
        #obs-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        #obs-dialog {
            background: white;
            border-radius: 16px;
            padding: 22px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 360px;
        }

        #obs-dialog h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 12px;
            padding-bottom: 10px;
            padding-left: 10px;
            border-bottom: 1px solid #eee;
            border-left: 4px solid #8e44ad;
        }

        .obs-info {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .obs-info strong { color: #2c3e50; }

        #obs-textarea {
            display: block;
            width: 100%;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.88rem;
            font-family: inherit;
            color: #2c3e50;
            resize: vertical;
            outline: none;
            margin: 12px 0 16px;
            transition: border-color 0.2s;
            min-height: 80px;
        }

        #obs-textarea:focus { border-color: #8e44ad; }

        .obs-buttons { display: flex; gap: 10px; justify-content: flex-end; }

        #obs-dialog button {
            min-width: 100px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.88rem;
            animation: none;
        }

        #obs-dialog .btn-guardar     { background: #8e44ad; color: white; }
        #obs-dialog .btn-cancelar-obs { background: #f0f2f5; color: #2c3e50; }

        @media (max-width: 600px) {
            button { padding: 10px 14px; font-size: 0.8rem; min-width: 70px; }
            .button-panel { padding: 12px; }
            .console { font-size: 0.75rem; padding: 10px 16px; }
            .polygon-popup { font-size: 0.75rem; padding: 10px 14px; max-width: 240px; }
            #compass { top: 70px; width: 40px; height: 40px; }
            #compass svg { width: 25px; height: 25px; }
            #scale-bar { bottom: 75px; left: 12px; padding: 4px 8px; }
            #scale-val { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📍 Visor GIS - Mediciones de Campo</h1>
        <p>GPS | Polígonos | Puntos | Medición de áreas</p>
    </div>
    <div class="console" id="console">
        <span class="icon">✅</span> <span>Visor listo</span>
    </div>
    <div id="map"></div>

    <!-- Panel de botones estático -->
    <div class="button-panel" id="buttonPanel">
        <div class="btn-group" id="grpPrincipal">
            <button id="btnGPS">📍 GPS</button>
            <button id="btnImportar">📂 Importar</button>
            <button id="btnDibujar">📐 Dibujar</button>
            <button id="btnPunto">📌 Punto</button>
            <button id="btnCambiarMapa">🗺️ Callejero</button>
        </div>
        <!-- Visible cuando hay polígonos O puntos -->
        <div class="btn-group" id="grpPoligonos" style="display:none">
            <button id="btnExportar">💾 Exportar</button>
            <button id="btnExportarPuntos" style="display:none">💾 Puntos</button>
            <button id="btnBorrar">🗑️ Borrar</button>
            <button id="btnCentrar">🎯 Centrar</button>
        </div>
        <div class="btn-group" id="grpTrack" style="display:none">
            <button id="btnTrack">🎯 Track</button>
        </div>
    </div>

    <!-- Brújula -->
    <div id="compass">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="#2c3e50" stroke-width="1.5" fill="white"/>
            <path d="M12 2L12 22" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 2L8 8"  stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 2L16 8" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="12" y="9" text-anchor="middle" font-size="5" fill="#e74c3c" font-weight="bold">N</text>
        </svg>
    </div>

    <!-- Barra de escala dinámica -->
    <div id="scale-bar">
        <div id="scale-ruler">
            <div class="scale-tick"></div>
            <div id="scale-body"></div>
            <div class="scale-tick"></div>
        </div>
        <div id="scale-val">--</div>
    </div>

    <!-- Panel de confirmación de borrado (móvil) -->
    <div id="confirm-panel">
        <div id="confirm-dialog">
            <p id="confirm-msg">¿Borrar este elemento?</p>
            <div class="confirm-buttons">
                <button id="confirm-ok"     class="btn-confirmar">🗑️ Confirmar</button>
                <button id="confirm-cancel" class="btn-cancelar">✕ Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal de observaciones para puntos de campo -->
    <div id="obs-panel">
        <div id="obs-dialog">
            <h3>📌 Nuevo punto de campo</h3>
            <div class="obs-info" id="obs-coords"></div>
            <div class="obs-info" id="obs-timestamp"></div>
            <textarea id="obs-textarea" rows="4" placeholder="Observaciones (opcional)…"></textarea>
            <div class="obs-buttons">
                <button id="obs-save"   class="btn-guardar">💾 Guardar</button>
                <button id="obs-cancel" class="btn-cancelar-obs">✕ Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.js"></script>
    <script>
    // ========== 1. MAPA ==========
    const view = new ol.View({
        center: ol.proj.fromLonLat([-3.7038, 40.4168]),
        zoom: 10
    });

    const map = new ol.Map({ target: 'map', view });

    // ========== 2. CAPAS BASE ==========
    const capaOrtofoto = new ol.layer.Tile({
        source: new ol.source.XYZ({
            url: 'https://tms-pnoa-ma.idee.es/1.0.0/pnoa-ma/{z}/{x}/{-y}.jpeg'
        }),
        visible: true
    });

    const capaCallejero = new ol.layer.Tile({
        source: new ol.source.OSM(),
        visible: false
    });

    map.addLayer(capaOrtofoto);
    map.addLayer(capaCallejero);

    let usandoOrtofoto = true;

    // ========== 3. FUNCIONES AUXILIARES ==========
    let _msgTimeout = null;

    function mostrarMensaje(texto) {
        const div = document.getElementById('console');
        if (!div) return;
        clearTimeout(_msgTimeout);
        div.innerHTML = `<span class="icon">📍</span> <span>${texto}</span>`;
        _msgTimeout = setTimeout(() => {
            div.innerHTML = `<span class="icon">✅</span> <span>Listo</span>`;
        }, 3000);
        console.log(texto);
    }

    // Área geodésica real (corrige distorsión de Web Mercator)
    function areaGeodesica(geometria) {
        return Math.abs(ol.sphere.getArea(geometria, { projection: 'EPSG:3857' }));
    }

    function formatearArea(m2) {
        return `${m2.toFixed(2)} m² (${(m2 / 10000).toFixed(4)} ha)`;
    }

    // [v3] Distancia euclídea en EPSG:3857 (~metros, error tolerable para filtros de pocos metros)
    function distanciaWebMercator(p1, p2) {
        const dx = p2[0] - p1[0];
        const dy = p2[1] - p1[1];
        return Math.sqrt(dx * dx + dy * dy);
    }

    // [v4] Timestamp en formato legible: DD/MM/AAAA HH:MM:SS
    function formatearTimestamp(isoStr) {
        const d   = new Date(isoStr);
        const pad = n => String(n).padStart(2, '0');
        return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ` +
               `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    // ========== 4. GPS ==========
    const estiloMiUbicacion = new ol.style.Style({
        image: new ol.style.Circle({
            radius: 12,
            fill: new ol.style.Fill({ color: '#2980b9' }),
            stroke: new ol.style.Stroke({ color: 'white', width: 3 })
        })
    });

    const fuenteGPS = new ol.source.Vector();
    const capaGPS   = new ol.layer.Vector({ source: fuenteGPS, style: estiloMiUbicacion });
    map.addLayer(capaGPS);

    let marcadorGPS        = null;
    let watchID            = null;
    let seguimientoActivo  = false;
    let primeraPosicion    = true;

    function actualizarPosicion(posicion) {
        const coordsWebMercator = ol.proj.fromLonLat([posicion.coords.longitude, posicion.coords.latitude]);
        if (marcadorGPS) fuenteGPS.removeFeature(marcadorGPS);
        marcadorGPS = new ol.Feature({ geometry: new ol.geom.Point(coordsWebMercator) });
        fuenteGPS.addFeature(marcadorGPS);
        if (seguimientoActivo && primeraPosicion) {
            view.setCenter(coordsWebMercator);
            view.setZoom(16);
            primeraPosicion = false;
        }
        if (trackActivo) anadirPuntoAlTrack();
    }

    function errorGPS(error) {
        mostrarMensaje(error.code === 1 ? 'Permiso de ubicación denegado' : 'Error al obtener ubicación');
    }

    function activarSeguimiento() {
        if (!navigator.geolocation) { mostrarMensaje('GPS no soportado'); return false; }
        primeraPosicion = true;
        navigator.geolocation.getCurrentPosition(actualizarPosicion, errorGPS, { enableHighAccuracy: true, timeout: 10000 });
        watchID = navigator.geolocation.watchPosition(actualizarPosicion, errorGPS, { enableHighAccuracy: true, timeout: 5000 });
        mostrarMensaje('GPS activado');
        return true;
    }

    function desactivarSeguimiento() {
        if (watchID !== null) {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
        }
        if (marcadorGPS) {
            fuenteGPS.removeFeature(marcadorGPS);
            marcadorGPS = null;
        }
        mostrarMensaje('GPS desactivado');
    }

    // ========== 5. TRACKER GPS ==========
    const DIST_MIN_TRACK = 3; // metros aprox. en EPSG:3857

    let trackActivo      = false;
    let puntosTrack      = [];
    let timestampsTrack  = [];

    const estiloLineaTrack = new ol.style.Style({
        stroke: new ol.style.Stroke({ color: '#2980b9', width: 4, lineDash: [5, 5] })
    });

    const estiloPoligonoTrack = new ol.style.Style({
        stroke: new ol.style.Stroke({ color: '#e67e22', width: 3 }),
        fill: new ol.style.Fill({ color: 'rgba(230, 126, 34, 0.25)' })
    });

    const fuenteLineaTrack = new ol.source.Vector();
    const capaLineaTrack   = new ol.layer.Vector({ source: fuenteLineaTrack, style: estiloLineaTrack });
    map.addLayer(capaLineaTrack);

    function actualizarLineaTrack() {
        if (puntosTrack.length < 2) return;
        fuenteLineaTrack.clear();
        fuenteLineaTrack.addFeature(new ol.Feature({ geometry: new ol.geom.LineString(puntosTrack) }));
    }

    function anadirPuntoAlTrack() {
        if (!marcadorGPS) return;
        const nuevaCoord = marcadorGPS.getGeometry().getCoordinates();
        if (puntosTrack.length > 0) {
            if (distanciaWebMercator(puntosTrack[puntosTrack.length - 1], nuevaCoord) < DIST_MIN_TRACK) return;
        }
        puntosTrack.push(nuevaCoord);
        timestampsTrack.push(new Date().toISOString());
        actualizarLineaTrack();
    }

    function limpiarLineaTrack() {
        puntosTrack     = [];
        timestampsTrack = [];
        fuenteLineaTrack.clear();
    }

    function finalizarTrack() {
        if (puntosTrack.length < 3) {
            mostrarMensaje(`Se necesitan al menos 3 puntos. Solo tienes ${puntosTrack.length}`);
            limpiarLineaTrack();
            return false;
        }
        const poligono = new ol.geom.Polygon([[...puntosTrack, puntosTrack[0]]]);
        const feature  = new ol.Feature({ geometry: poligono });
        feature.setStyle(estiloPoligonoTrack);
        feature.setProperties({
            track_inicio: timestampsTrack[0],
            track_fin:    timestampsTrack[timestampsTrack.length - 1],
            track_puntos: puntosTrack.length
        });
        fuentePol.addFeature(feature);
        mostrarMensaje(`Polígono creado — Área: ${formatearArea(areaGeodesica(poligono))}`);
        limpiarLineaTrack();
        return true;
    }

    function iniciarTrack() {
        if (!seguimientoActivo) { mostrarMensaje('Activa el GPS primero'); return false; }
        if (!marcadorGPS) { mostrarMensaje('Esperando GPS...'); return false; }
        // Modo punto y tracker son exclusivos
        if (modoPuntoActivo) {
            modoPuntoActivo = false;
            selectInteraction.setActive(true);
        }
        limpiarLineaTrack();
        trackActivo = true;
        anadirPuntoAlTrack();
        mostrarMensaje('Track iniciado — Camina para grabar');
        return true;
    }

    function toggleTrack() {
        if (trackActivo) {
            finalizarTrack();
            trackActivo = false;
        } else {
            iniciarTrack();
        }
        actualizarInterfaz();
    }

    // ========== 6. CAPA DE POLÍGONOS ==========
    const fuentePol = new ol.source.Vector();
    const capaPol   = new ol.layer.Vector({
        source: fuentePol,
        style: new ol.style.Style({
            stroke: new ol.style.Stroke({ color: '#e67e22', width: 3 }),
            fill:   new ol.style.Fill({ color: 'rgba(230, 126, 34, 0.2)' })
        })
    });
    map.addLayer(capaPol);

    // ========== 7. POPUP ==========
    const popupElement = document.createElement('div');
    popupElement.className = 'polygon-popup';
    popupElement.style.display = 'none';
    document.body.appendChild(popupElement);

    const popupOverlay = document.createElement('div');
    popupOverlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:998;display:none;';
    document.body.appendChild(popupOverlay);

    let popupVisible = false;
    let poligonoSeleccionadoActual = null;

    // Calcula posición viewport a partir de coordenadas de píxel OL
    function _calcPosPopup(pixelCoords) {
        const mapRect = map.getTargetElement().getBoundingClientRect();
        let vx = mapRect.left + pixelCoords[0] + 15;
        let vy = mapRect.top  + pixelCoords[1] - 10;
        if (vx + 300 > window.innerWidth)  vx = mapRect.left + pixelCoords[0] - 295;
        if (vy + 220 > window.innerHeight) vy = Math.max(mapRect.top + 10, vy - 200);
        return { left: Math.max(5, vx), top: Math.max(5, vy) };
    }

    function mostrarPopup(pixelCoords, propiedades, area) {
        let html = `
            <div style="font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee;">
                📐 Información del polígono
            </div>
            <div style="margin-bottom:8px;">
                <span style="color:#27ae60;">📏 Área:</span>
                <strong>${area.toFixed(2)} m²</strong>
                <span style="color:#7f8c8d;">(${(area / 10000).toFixed(4)} ha)</span>
            </div>
        `;

        const claves = Object.keys(propiedades).filter(k =>
            k !== 'geometry' && k !== 'area_m2' && propiedades[k] != null
        );
        if (claves.length > 0) {
            html += `<div style="margin-top:8px;padding-top:4px;">`;
            for (const clave of claves) {
                html += `
                    <div style="margin-bottom:4px;font-size:0.75rem;">
                        <span style="color:#7f8c8d;">${clave}:</span>
                        <strong>${propiedades[clave]}</strong>
                    </div>
                `;
            }
            html += `</div>`;
        }

        html += `<div style="margin-top:8px;font-size:0.7rem;color:#95a5a6;text-align:center;border-top:1px solid #eee;padding-top:6px;">🖱️ Haz clic fuera para cerrar</div>`;

        const pos = _calcPosPopup(pixelCoords);
        popupElement.innerHTML = html;
        popupElement.style.borderLeftColor = '#27ae60';
        popupElement.style.left    = `${pos.left}px`;
        popupElement.style.top     = `${pos.top}px`;
        popupElement.style.display = 'block';
        popupOverlay.style.display = 'block';
        popupVisible = true;
    }

    function ocultarPopup() {
        popupElement.style.display = 'none';
        popupOverlay.style.display = 'none';
        popupVisible = false;
        poligonoSeleccionadoActual = null;
    }

    popupOverlay.addEventListener('click', ocultarPopup);

    // ========== 8. SELECCIÓN DE POLÍGONOS Y PUNTOS ==========
    const estiloSeleccion = new ol.style.Style({
        stroke: new ol.style.Stroke({ color: '#f1c40f', width: 4 }),
        fill:   new ol.style.Fill({ color: 'rgba(241, 196, 15, 0.3)' })
    });

    // Excluir capa GPS y línea de track: solo seleccionables polígonos y puntos de campo
    const selectInteraction = new ol.interaction.Select({
        layers: (layer) => layer !== capaGPS && layer !== capaLineaTrack,
        style: (feature) => {
            if (feature.getGeometry().getType() === 'Point') {
                return new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 12,
                        fill: new ol.style.Fill({ color: '#f1c40f' }),
                        stroke: new ol.style.Stroke({ color: 'white', width: 3 })
                    }),
                    text: new ol.style.Text({
                        text: String(feature.get('id') || ''),
                        offsetY: -22,
                        font: 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif',
                        fill:   new ol.style.Fill({ color: '#e67e22' }),
                        stroke: new ol.style.Stroke({ color: 'white', width: 3 })
                    })
                });
            }
            return estiloSeleccion;
        }
    });
    map.addInteraction(selectInteraction);

    selectInteraction.on('select', (evento) => {
        if (evento.selected.length === 0) {
            if (popupVisible) ocultarPopup();
            return;
        }
        const feature = evento.selected[0];
        poligonoSeleccionadoActual = feature;
        const tipo = feature.getGeometry().getType();
        const { geometry: _g, ...propiedades } = feature.getProperties();
        const pixelCoords = evento.mapBrowserEvent ? evento.mapBrowserEvent.pixel : [100, 100];

        if (tipo === 'Point') {
            mostrarPopupPunto(pixelCoords, propiedades);
        } else {
            mostrarPopup(pixelCoords, propiedades, areaGeodesica(feature.getGeometry()));
        }
    });

    // ========== 9. DIBUJO DE POLÍGONOS ==========
    const addInteraction = new ol.interaction.Draw({
        source: fuentePol,
        type: 'Polygon',
        clickTolerance: 8
    });

    addInteraction.on('drawend', (evento) => {
        const area = areaGeodesica(evento.feature.getGeometry());
        mostrarMensaje(`Polígono dibujado — Área: ${formatearArea(area)}`);
        actualizarInterfaz();
    });

    let modoAddActivo = false;

    // ========== 10. FUNCIONES DE CONTROL ==========
    function toggleGPS() {
        if (seguimientoActivo) {
            if (trackActivo) toggleTrack();
            desactivarSeguimiento();
            seguimientoActivo = false;
        } else {
            seguimientoActivo = activarSeguimiento();
        }
        actualizarInterfaz();
    }

    function toggleDibujo() {
        if (seguimientoActivo) {
            mostrarMensaje('Desactiva el GPS para dibujar');
            return;
        }
        // Modos exclusivos: desactivar punto si estaba activo
        if (modoPuntoActivo) {
            modoPuntoActivo = false;
            selectInteraction.setActive(true);
        }
        modoAddActivo = !modoAddActivo;
        if (modoAddActivo) {
            map.addInteraction(addInteraction);
            mostrarMensaje('Modo dibujo activado');
        } else {
            map.removeInteraction(addInteraction);
            mostrarMensaje('Modo dibujo desactivado');
        }
        actualizarInterfaz();
    }

    function cambiarMapaBase() {
        usandoOrtofoto = !usandoOrtofoto;
        capaOrtofoto.setVisible(usandoOrtofoto);
        capaCallejero.setVisible(!usandoOrtofoto);
        document.getElementById('btnCambiarMapa').textContent = usandoOrtofoto ? '🗺️ Callejero' : '🛰️ Ortofoto';
        mostrarMensaje(usandoOrtofoto ? 'Modo ortofoto' : 'Modo callejero');
    }

    // Borra el feature seleccionado (polígono o punto) con confirmación
    function borrarSeleccionado() {
        const seleccionados = selectInteraction.getFeatures();
        if (seleccionados.getLength() === 0) {
            mostrarMensaje('Selecciona un polígono o punto (clic en él)');
            return;
        }

        const feature  = seleccionados.item(0);
        const esPunto  = feature.getGeometry().getType() === 'Point';
        const msg      = esPunto ? '¿Borrar este punto?' : '¿Borrar este polígono?';

        const ejecutarBorrado = () => {
            if (esPunto) {
                fuentePuntos.removeFeature(feature);
                mostrarMensaje(`Punto borrado. Quedan ${fuentePuntos.getFeatures().length}`);
            } else {
                fuentePol.removeFeature(feature);
                mostrarMensaje(`Polígono borrado. Quedan ${fuentePol.getFeatures().length}`);
            }
            seleccionados.clear();
            ocultarPopup();
            actualizarInterfaz();
        };

        const esMóvil = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (esMóvil) {
            mostrarConfirmacion(msg, ejecutarBorrado);
        } else {
            if (confirm(msg)) ejecutarBorrado();
        }
    }

    // Centra la vista en todos los elementos (polígonos + puntos)
    function centrarEnPoligonos() {
        const features = [...fuentePol.getFeatures(), ...fuentePuntos.getFeatures()];
        if (features.length === 0) { mostrarMensaje('No hay elementos'); return; }
        const extension = ol.extent.createEmpty();
        features.forEach(f => ol.extent.extend(extension, f.getGeometry().getExtent()));
        view.fit(extension, { padding: [50, 50, 50, 50], duration: 500, maxZoom: 18 });
        const nPol    = fuentePol.getFeatures().length;
        const nPuntos = fuentePuntos.getFeatures().length;
        const partes  = [];
        if (nPol)    partes.push(`${nPol} polígono${nPol    > 1 ? 's' : ''}`);
        if (nPuntos) partes.push(`${nPuntos} punto${nPuntos > 1 ? 's' : ''}`);
        mostrarMensaje(`Centrado en ${partes.join(' y ')}`);
    }

    function exportarGeoJSON() {
        const seleccionados    = selectInteraction.getFeatures();
        const tieneSeleccionado = seleccionados.getLength() > 0 &&
            seleccionados.item(0).getGeometry().getType() !== 'Point';
        const features = tieneSeleccionado ? [seleccionados.item(0)] : fuentePol.getFeatures();

        if (features.length === 0) {
            mostrarMensaje('No hay polígonos para exportar');
            return;
        }

        const geojson = {
            type: 'FeatureCollection',
            features: features.map(feature => {
                const coords = feature.getGeometry().getCoordinates();
                const { geometry: _g, ...propiedades } = feature.getProperties();
                return {
                    type: 'Feature',
                    geometry: {
                        type: 'Polygon',
                        coordinates: coords.map(ring => ring.map(c => ol.proj.toLonLat(c)))
                    },
                    properties: { ...propiedades, area_m2: areaGeodesica(feature.getGeometry()).toFixed(2) }
                };
            })
        };

        const fechaStr = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url;
        a.download = `poligonos_${fechaStr}${tieneSeleccionado ? '_seleccionado' : ''}.geojson`;
        a.click();
        URL.revokeObjectURL(url);
        mostrarMensaje(`Exportados ${features.length} polígono${features.length > 1 ? 's' : ''}`);
    }

    function importarGeoJSON(evento) {
        const archivo = evento.target.files[0];
        if (!archivo) return;
        mostrarMensaje('Cargando GeoJSON...');
        const lector = new FileReader();
        lector.onload = (e) => {
            try {
                const features = new ol.format.GeoJSON().readFeatures(e.target.result, {
                    dataProjection: 'EPSG:4326',
                    featureProjection: 'EPSG:3857'
                });
                fuentePol.addFeatures(features);
                mostrarMensaje(`Cargados ${features.length} polígono${features.length > 1 ? 's' : ''}`);
                if (features.length) centrarEnPoligonos();
                actualizarInterfaz();
            } catch {
                mostrarMensaje('Error al cargar el archivo GeoJSON');
            }
        };
        lector.readAsText(archivo);
        evento.target.value = '';
    }

    // ========== 11. INTERFAZ ==========
    function actualizarInterfaz() {
        const tienePoligonos = fuentePol.getFeatures().length > 0;
        const tienePuntos    = fuentePuntos.getFeatures().length > 0;
        const tieneContenido = tienePoligonos || tienePuntos;

        // Grupo principal
        const btnGPS = document.getElementById('btnGPS');
        btnGPS.className  = seguimientoActivo ? 'activo-gps' : '';
        btnGPS.textContent = seguimientoActivo ? '🔴 GPS' : '📍 GPS';

        document.getElementById('btnDibujar').className = modoAddActivo   ? 'activo'       : '';
        document.getElementById('btnPunto').className   = modoPuntoActivo ? 'activo-punto' : '';

        // Grupo acciones: visible cuando hay polígonos o puntos
        document.getElementById('grpPoligonos').style.display = tieneContenido ? '' : 'none';
        if (tieneContenido) {
            document.getElementById('btnExportar').style.display       = tienePoligonos ? '' : 'none';
            document.getElementById('btnExportarPuntos').style.display = tienePuntos    ? '' : 'none';
        }

        // Grupo track
        document.getElementById('grpTrack').style.display = seguimientoActivo ? '' : 'none';
        if (seguimientoActivo) {
            const btnTrack = document.getElementById('btnTrack');
            btnTrack.className  = trackActivo ? 'track-activo' : '';
            btnTrack.textContent = trackActivo ? '⏹️ Finalizar' : '🎯 Track';
        }
    }

    // ========== 12. INPUT OCULTO PARA IMPORTAR ==========
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.geojson,.json';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', importarGeoJSON);
    document.body.appendChild(fileInput);

    // ========== 13. CONFIRMACIÓN DE BORRADO ==========
    let _confirmCallback = null;

    function mostrarConfirmacion(mensaje, onConfirm) {
        document.getElementById('confirm-msg').textContent = mensaje;
        document.getElementById('confirm-panel').style.display = 'flex';
        _confirmCallback = onConfirm;
    }

    function ocultarConfirmacion() {
        document.getElementById('confirm-panel').style.display = 'none';
        _confirmCallback = null;
    }

    document.getElementById('confirm-ok').addEventListener('click', () => {
        const cb = _confirmCallback;
        ocultarConfirmacion();
        if (cb) cb();
    });

    document.getElementById('confirm-cancel').addEventListener('click', ocultarConfirmacion);

    // ========== 14. EVENTOS DE BOTONES (registrados una sola vez) ==========
    document.getElementById('btnGPS').addEventListener('click', toggleGPS);
    document.getElementById('btnImportar').addEventListener('click', () => fileInput.click());
    document.getElementById('btnDibujar').addEventListener('click', toggleDibujo);
    document.getElementById('btnPunto').addEventListener('click', togglePunto);
    document.getElementById('btnCambiarMapa').addEventListener('click', cambiarMapaBase);
    document.getElementById('btnExportar').addEventListener('click', exportarGeoJSON);
    document.getElementById('btnExportarPuntos').addEventListener('click', exportarPuntos);
    document.getElementById('btnBorrar').addEventListener('click', borrarSeleccionado);
    document.getElementById('btnCentrar').addEventListener('click', centrarEnPoligonos);
    document.getElementById('btnTrack').addEventListener('click', toggleTrack);

    // ========== 15. BRÚJULA ==========
    document.getElementById('compass').addEventListener('click', () => {
        if (view.getRotation() !== 0) {
            view.animate({ rotation: 0, duration: 500 });
            mostrarMensaje('🧭 Mapa orientado al norte');
        } else {
            mostrarMensaje('🧭 El mapa ya está orientado al norte');
        }
    });

    const compassSvg = document.querySelector('#compass svg');
    view.on('change:rotation', () => {
        compassSvg.style.transform = `rotate(${-view.getRotation()}rad)`;
    });

    // ========== 16. BARRA DE ESCALA ==========
    const scaleBodyEl = document.getElementById('scale-body');
    const scaleValEl  = document.getElementById('scale-val');

    function actualizarEscala() {
        const resolution = view.getResolution();
        if (resolution == null) return;
        const metrosTarget = resolution * 100;
        const magnitud = Math.pow(10, Math.floor(Math.log10(metrosTarget)));
        const norm     = metrosTarget / magnitud;
        let factor;
        if      (norm < 1.5) factor = 1;
        else if (norm < 3.5) factor = 2;
        else if (norm < 7.5) factor = 5;
        else                 factor = 10;
        const metros  = factor * magnitud;
        const pixeles = Math.round(metros / resolution);
        scaleBodyEl.style.width = `${pixeles}px`;
        scaleValEl.textContent  = metros >= 1000
            ? `${Math.round(metros / 1000)} km`
            : `${metros} m`;
    }

    view.on('change:resolution', actualizarEscala);
    actualizarEscala();

    // ========== 17. PUNTOS DE CAMPO ==========

    // Estado
    let modoPuntoActivo  = false;
    let _nextPuntoId     = 1;
    let _puntoEnCaptura  = null; // { lonLat: [lon, lat], fecha: Date }

    // Estilo: círculo morado con etiqueta del ID (contrasta con azul GPS y naranja polígonos)
    function estiloPunto(feature) {
        return new ol.style.Style({
            image: new ol.style.Circle({
                radius: 9,
                fill:   new ol.style.Fill({ color: '#8e44ad' }),
                stroke: new ol.style.Stroke({ color: 'white', width: 2.5 })
            }),
            text: new ol.style.Text({
                text:      String(feature.get('id')),
                offsetY:   -18,
                font:      'bold 11px -apple-system, BlinkMacSystemFont, sans-serif',
                fill:      new ol.style.Fill({ color: '#8e44ad' }),
                stroke:    new ol.style.Stroke({ color: 'white', width: 3 }),
                textAlign: 'center'
            })
        });
    }

    const fuentePuntos = new ol.source.Vector();
    const capaPuntos   = new ol.layer.Vector({ source: fuentePuntos, style: estiloPunto });
    map.addLayer(capaPuntos);

    // Modal de observaciones
    function mostrarModalPunto(lonLat, fecha) {
        _puntoEnCaptura = { lonLat, fecha };
        document.getElementById('obs-coords').innerHTML =
            `📍 <strong>${lonLat[1].toFixed(6)}° N, ${lonLat[0].toFixed(6)}° E</strong>`;
        document.getElementById('obs-timestamp').textContent =
            `🕐 ${formatearTimestamp(fecha.toISOString())}`;
        document.getElementById('obs-textarea').value = '';
        document.getElementById('obs-panel').style.display = 'flex';
        setTimeout(() => document.getElementById('obs-textarea').focus(), 50);
    }

    function ocultarModalPunto() {
        _puntoEnCaptura = null;
        document.getElementById('obs-panel').style.display = 'none';
    }

    function guardarPunto() {
        if (!_puntoEnCaptura) return;
        const { lonLat, fecha } = _puntoEnCaptura;
        const observaciones     = document.getElementById('obs-textarea').value.trim();
        const id                = _nextPuntoId++;

        const feature = new ol.Feature({
            geometry: new ol.geom.Point(ol.proj.fromLonLat(lonLat))
        });
        feature.setProperties({
            id,
            observaciones,
            timestamp: fecha.toISOString(),
            lon:       lonLat[0],
            lat:       lonLat[1]
        });
        fuentePuntos.addFeature(feature);

        mostrarMensaje(`Punto #${id} registrado`);
        ocultarModalPunto();
        actualizarInterfaz();
    }

    // Captura de clic en el mapa (solo cuando modo punto está activo)
    map.on('click', (evento) => {
        if (!modoPuntoActivo) return;
        mostrarModalPunto(ol.proj.toLonLat(evento.coordinate), new Date());
    });

    // Toggle modo punto (exclusivo con dibujo y tracker)
    function togglePunto() {
        if (trackActivo) {
            mostrarMensaje('Detén el track antes de usar modo punto');
            return;
        }
        // Desactivar modo dibujo si estaba activo
        if (modoAddActivo) {
            map.removeInteraction(addInteraction);
            modoAddActivo = false;
        }
        modoPuntoActivo = !modoPuntoActivo;
        // Desactivar selección mientras se captura para no seleccionar features cercanos
        selectInteraction.setActive(!modoPuntoActivo);
        mostrarMensaje(modoPuntoActivo
            ? '📌 Modo punto — Clic en el mapa para registrar'
            : 'Modo punto desactivado');
        actualizarInterfaz();
    }

    // Popup para un punto seleccionado
    function mostrarPopupPunto(pixelCoords, props) {
        let html = `
            <div style="font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee;">
                📌 Punto de campo #${props.id}
            </div>
            <div style="margin-bottom:6px;font-size:0.8rem;">
                <span style="color:#7f8c8d;">📍 Coordenadas:</span><br>
                <strong>${Number(props.lat).toFixed(6)}° N, ${Number(props.lon).toFixed(6)}° E</strong>
            </div>
            <div style="margin-bottom:6px;font-size:0.8rem;">
                <span style="color:#7f8c8d;">🕐 Capturado:</span>
                <strong>${formatearTimestamp(props.timestamp)}</strong>
            </div>
        `;
        if (props.observaciones) {
            html += `
                <div style="margin-bottom:6px;font-size:0.8rem;">
                    <span style="color:#7f8c8d;">💬 Observaciones:</span><br>
                    <span style="color:#2c3e50;">${props.observaciones}</span>
                </div>
            `;
        }
        html += `<div style="margin-top:8px;font-size:0.7rem;color:#95a5a6;text-align:center;border-top:1px solid #eee;padding-top:6px;">🖱️ Haz clic fuera para cerrar</div>`;

        const pos = _calcPosPopup(pixelCoords);
        popupElement.innerHTML = html;
        popupElement.style.borderLeftColor = '#8e44ad';
        popupElement.style.left    = `${pos.left}px`;
        popupElement.style.top     = `${pos.top}px`;
        popupElement.style.display = 'block';
        popupOverlay.style.display = 'block';
        popupVisible = true;
    }

    // Exportar capa de puntos como GeoJSON independiente
    function exportarPuntos() {
        const features = fuentePuntos.getFeatures();
        if (features.length === 0) { mostrarMensaje('No hay puntos para exportar'); return; }

        const geojson = {
            type: 'FeatureCollection',
            features: features.map(feature => {
                const { geometry: _g, ...props } = feature.getProperties();
                return {
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [props.lon, props.lat] },
                    properties: {
                        id:            props.id,
                        observaciones: props.observaciones,
                        timestamp:     props.timestamp,
                        lon:           props.lon,
                        lat:           props.lat
                    }
                };
            })
        };

        const fechaStr = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url;
        a.download = `puntos_${fechaStr}.geojson`;
        a.click();
        URL.revokeObjectURL(url);
        mostrarMensaje(`Exportados ${features.length} punto${features.length > 1 ? 's' : ''}`);
    }

    // Eventos internos del modal de observaciones
    document.getElementById('obs-save').addEventListener('click', guardarPunto);
    document.getElementById('obs-cancel').addEventListener('click', ocultarModalPunto);
    document.getElementById('obs-panel').addEventListener('click', (e) => {
        if (e.target === document.getElementById('obs-panel')) ocultarModalPunto();
    });
    // Ctrl/Cmd + Enter para guardar desde el teclado
    document.getElementById('obs-textarea').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) guardarPunto();
    });

    // ========== 18. INICIALIZAR ==========
    actualizarInterfaz();
    mostrarMensaje('Visor listo');
    </script>
</body>
</html>
